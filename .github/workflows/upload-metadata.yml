name: Upload Metadata & Screenshots

on:
  workflow_dispatch:
    inputs:
      skip_screenshots:
        description: '跳过截图上传'
        required: false
        default: 'false'
        type: boolean

jobs:
  upload-metadata:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - run: gem install fastlane --no-document

      - name: 生成 ASC API Key JSON
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          # Handle both real newlines and literal "\n" sequences in the secret.
          export ASC_PRIVATE_KEY_NORMALIZED="${ASC_PRIVATE_KEY//\\n/$'\n'}"
          ruby -rjson -e '
            payload = {
              key_id: ENV.fetch("ASC_KEY_ID"),
              issuer_id: ENV.fetch("ASC_ISSUER_ID"),
              key: ENV.fetch("ASC_PRIVATE_KEY_NORMALIZED"),
              duration: 1200,
              in_house: false
            }
            File.write("/tmp/asc_api_key.json", JSON.generate(payload))
          '

      - name: Upload metadata
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          fastlane deliver \
            --api_key_path /tmp/asc_api_key.json \
            --app_identifier com.powerpoint.slidesh \
            --metadata_path metadata \
            --skip_binary_upload \
            --skip_screenshots ${{ inputs.skip_screenshots }} \
            --skip_app_version_update \
            --force

      - if: always()
        run: rm -f ~/.appstoreconnect/private_keys/*.p8 /tmp/asc_api_key.json
