name: Build & Upload IPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: '上传到 TestFlight'
        required: false
        default: 'true'
        type: boolean

env:
  SCHEME: Slidesh
  PROJECT: Slidesh.xcodeproj
  BUNDLE_ID: com.powerpoint.slidesh
  XCODE_VERSION: '16.0'

jobs:
  build:
    name: Build & Archive
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Install signing certificate
        env:
          DIST_CERTIFICATE_BASE64: ${{ secrets.DIST_CERTIFICATE_BASE64 }}
          DIST_CERTIFICATE_PASSWORD: ${{ secrets.DIST_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "$DIST_CERTIFICATE_BASE64" | base64 --decode -o $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$DIST_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          PP_PATH=$RUNNER_TEMP/app.mobileprovision
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Resolve dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ${{ env.PROJECT }} -scheme ${{ env.SCHEME }}

      - name: Archive
        run: |
          xcodebuild archive \
            -project ${{ env.PROJECT }} \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Slidesh.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.TEAM_ID }} \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_SPECIFIER }}" \
            | xcpretty

      - name: Export IPA
        run: |
          cp ExportOptions.plist $RUNNER_TEMP/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Set :teamID ${{ secrets.TEAM_ID }}" \
            $RUNNER_TEMP/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Set :signingStyle manual" \
            $RUNNER_TEMP/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Delete :provisioningProfiles" \
            $RUNNER_TEMP/ExportOptions.plist >/dev/null 2>&1 || true
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" \
            $RUNNER_TEMP/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:${{ env.BUNDLE_ID }} string ${{ secrets.PROVISIONING_PROFILE_SPECIFIER }}" \
            $RUNNER_TEMP/ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Slidesh.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist | xcpretty

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Slidesh-${{ github.ref_name }}.ipa
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 7

      - name: Upload to TestFlight
        if: ${{ inputs.upload_to_testflight != 'false' }}
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          echo "$ASC_API_KEY_CONTENT" | base64 --decode \
            > $RUNNER_TEMP/AuthKey_${ASC_API_KEY_ID}.p8
          xcrun altool --upload-app --type ios \
            --file $RUNNER_TEMP/export/*.ipa \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_KEY_ISSUER_ID" \
            --private-key $RUNNER_TEMP/AuthKey_${ASC_API_KEY_ID}.p8

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
